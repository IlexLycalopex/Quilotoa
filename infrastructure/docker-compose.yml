version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: msas_postgres
    environment:
      POSTGRES_USER: msas
      POSTGRES_PASSWORD: msas
      POSTGRES_DB: msas_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U msas -d msas_dev']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      target: development
    container_name: msas_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://msas:msas@postgres:5432/msas_dev
      JWT_SECRET: dev-secret-change-in-production-must-be-32-chars
      NODE_ENV: development
      PORT: 3001
      CORS_ORIGIN: http://localhost:5173
      STORAGE_DRIVER: local
      STORAGE_LOCAL_PATH: /app/storage/proposals
    ports:
      - '3001:3001'
    volumes:
      - ../apps/api/src:/app/src
      - api_storage:/app/storage

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      target: development
    container_name: msas_web
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:3001/api/v1
    ports:
      - '5173:5173'
    volumes:
      - ../apps/web/src:/app/src

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: msas_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@msas.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  postgres_data:
  api_storage:
