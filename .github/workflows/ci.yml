name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: msas
          POSTGRES_PASSWORD: msas
          POSTGRES_DB: msas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build shared
        run: pnpm --filter @msas/shared build

      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://msas:msas@localhost:5432/msas_test
          JWT_SECRET: test-secret-must-be-at-least-32-characters-long
          NODE_ENV: test

      - name: Build all
        run: pnpm build
